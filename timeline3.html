<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Timeline 3</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
overflow:hidden;
background:black;
}

.world{
width:100vw;
height:100vh;

background:url("./timeline3-bg.jpg");
background-size:cover;
background-position:center;

position:relative;
}

/* Intro */

.intro{
position:absolute;

top:70px;
left:50%;

transform:translateX(-50%);

text-align:center;

color:white;

font-size:24px;
font-weight:300;

text-shadow:0 4px 15px rgba(0,0,0,.25);

z-index:20;

transition:1.5s;
}

.intro.hide{
opacity:0;
pointer-events:none;
}

/* Telephone hotspot */

.phone{
position:absolute;

left:7%;
top:45%;

width:230px;
height:170px;

cursor:pointer;

z-index:10;
}

/* Memory */

.memory{
position:absolute;
inset:0;

display:flex;
justify-content:center;
align-items:center;

background:rgba(0,0,0,.25);
backdrop-filter:blur(10px);

opacity:0;
pointer-events:none;

transition:.5s;

z-index:40;
}

.memory.show{
opacity:1;
}

.memory-box{

max-width:560px;

text-align:center;

color:white;

padding:40px;
}

.memory-box p{

font-size:22px;
font-weight:300;
line-height:1.6;
}

/* Black screen */

.fade-black{

position:absolute;
inset:0;

background:black;

opacity:0;
pointer-events:none;

transition:2s;

z-index:50;
}

.fade-black.show{
opacity:1;
}

/* Door */

.next-door{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

opacity:0;
pointer-events:none;

z-index:60;

transition:1.2s;
}

.next-door.show{
opacity:1;
pointer-events:auto;
}

.next-door img{

width:150px;

cursor:pointer;

transition:.3s;
}

.next-door img:hover{
transform:translateY(-5px);
}

</style>
</head>
<body>

<div class="world">

<div class="intro" id="intro">
<p>
In another timeline,<br>
you called first.
</p>
</div>

<!-- Phone -->

<div
class="phone"
onclick="phoneClick()">
</div>

<!-- Memory -->

<div class="memory" id="memory">

<div class="memory-box">
<p id="memoryText"></p>
</div>

</div>

<!-- Black -->

<div class="fade-black" id="fadeBlack"></div>

<!-- Door -->

<div class="next-door" id="nextDoor">

<img
src="./door4.png"
onclick="goNext()"
alt="door">

</div>

</div>

<script>

let stage = 0;

window.addEventListener("load",()=>{

setTimeout(()=>{

document
.getElementById("intro")
.classList.add("hide");

},3500);

});

function showText(message){

const memory =
document.getElementById("memory");

const text =
document.getElementById("memoryText");

text.innerHTML =
message.replace(/\n/g,"<br>");

memory.classList.add("show");

setTimeout(()=>{

memory.classList.remove("show");

},3500);

}

function phoneClick(){

if(stage === 0){

showText(`Ring...

Ring...

Ring...`);

stage++;

return;

}

if(stage === 1){

showText(`You still didn't pick up.`);

stage++;

return;

}

if(stage === 2){

showText(`That's okay.

We still found our way here.`);

stage++;

setTimeout(()=>{

document
.getElementById("fadeBlack")
.classList.add("show");

setTimeout(()=>{

document
.getElementById("nextDoor")
.classList.add("show");

},2500);

},5000);

}

}

function goNext(){

window.location.href =
"./timeline4.html";

}

</script>

</body>
</html>
