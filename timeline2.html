<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Timeline 2</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
overflow:hidden;
background:black;
}

.world{
width:100vw;
height:100vh;

background:url("./timeline2-bg.jpg");
background-size:cover;
background-position:center;

position:relative;
}

/* INTRO */

.intro{
position:absolute;

top:70px;
left:50%;

transform:translateX(-50%);

text-align:center;

color:white;

font-size:24px;
font-weight:300;

text-shadow:0 4px 15px rgba(0,0,0,.25);

z-index:20;

transition:1.5s;
}

.intro.hide{
opacity:0;
pointer-events:none;
}

/* HOTSPOTS */

.hotspot{
position:absolute;
cursor:pointer;
}

/* 2018 */

.year2018{
left:35%;
top:34%;

width:130px;
height:170px;
}

/* 2019 */

.year2019{
left:49%;
top:34%;

width:130px;
height:170px;
}

/* 2020 */

.year2020{
left:63%;
top:34%;

width:130px;
height:170px;
}

/* MEMORY POPUP */

.memory{
position:absolute;
inset:0;

display:flex;
justify-content:center;
align-items:center;

background:rgba(0,0,0,.25);
backdrop-filter:blur(10px);

opacity:0;
pointer-events:none;

transition:.5s;

z-index:40;
}

.memory.show{
opacity:1;
}

.memory-box{
max-width:560px;

text-align:center;

color:white;

padding:40px;
}

.memory-box p{
font-size:20px;
font-weight:300;
line-height:1.55;
}

/* BLACK SCREEN */

.fade-black{
position:absolute;
inset:0;

background:black;

opacity:0;
pointer-events:none;

transition:2s;

z-index:50;
}

.fade-black.show{
opacity:1;
}

/* DOOR */

.next-door{
position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

opacity:0;
pointer-events:none;

z-index:60;

transition:1.2s;
}

.next-door.show{
opacity:1;
pointer-events:auto;
}

.next-door img{
width:150px;
cursor:pointer;
transition:.3s;
}

.next-door img:hover{
transform:translateY(-5px);
}

</style>
</head>
<body>

<div class="world">

<div class="intro" id="intro">
<p>
In another timeline,<br>
we met years earlier.
</p>
</div>

<!-- 2018 -->

<div
class="hotspot year2018"
onclick="showMemory(0)">
</div>

<!-- 2019 -->

<div
class="hotspot year2019"
onclick="showMemory(1)">
</div>

<!-- 2020 -->

<div
class="hotspot year2020"
onclick="showMemory(2)">
</div>

<!-- MEMORY -->

<div class="memory" id="memory">

<div class="memory-box">
<p id="memoryText"></p>
</div>

</div>

<!-- BLACK SCREEN -->

<div class="fade-black" id="fadeBlack"></div>

<!-- NEXT DOOR -->

<div class="next-door" id="nextDoor">

<img
src="./door3.png"
onclick="goNext()"
alt="door">

</div>

</div>

<script>

const memoryTexts = [

`We should've met here.`,

`We definitely would've become friends here.`,

`Honestly,

we would've found each other anyway.`

];

let found = new Set();

window.addEventListener("load",()=>{

setTimeout(()=>{

document
.getElementById("intro")
.classList.add("hide");

},3500);

});

function showMemory(index){

const memory =
document.getElementById("memory");

const text =
document.getElementById("memoryText");

text.innerHTML =
memoryTexts[index].replace(/\n/g,"<br>");

memory.classList.add("show");

found.add(index);

setTimeout(()=>{

memory.classList.remove("show");

if(found.size === 3){

setTimeout(()=>{

document
.getElementById("fadeBlack")
.classList.add("show");

setTimeout(()=>{

document
.getElementById("nextDoor")
.classList.add("show");

},2500);

},1500);

}

},4000);

}

function goNext(){

window.location.href =
"./timeline3.html";

}

</script>

</body>
</html>
