<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>In Another Timeline</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
overflow:hidden;
background:black;
}

.world{
width:100vw;
height:100vh;

background:url("./timeline1-bg.jpg");
background-size:cover;
background-position:center;

position:relative;
}

.intro{
position:absolute;
inset:0;

display:flex;
justify-content:center;
align-items:center;

text-align:center;

color:white;

font-size:28px;
font-weight:300;

background:rgba(0,0,0,.15);

z-index:20;

transition:1.5s;
}

.intro.hide{
opacity:0;
pointer-events:none;
}

.hotspot{
position:absolute;
cursor:pointer;
}

.school{
left:16%;
top:43%;

width:180px;
height:220px;
}

.bench{
right:10%;
bottom:6%;

width:220px;
height:150px;
}

.claw{
right:4%;
top:28%;

width:260px;
height:320px;
}

.memory{
position:absolute;
inset:0;

display:flex;
justify-content:center;
align-items:center;

background:rgba(0,0,0,.25);
backdrop-filter:blur(10px);

opacity:0;
pointer-events:none;

transition:.5s;

z-index:30;
}

.memory.show{
opacity:1;
}

.memory-box{
max-width:520px;

text-align:center;

color:white;

padding:40px;
}

.memory-box p{
font-size:22px;
font-weight:300;
line-height:1.8;
}

.fade-black{
position:absolute;
inset:0;

background:black;

opacity:0;
pointer-events:none;

transition:2s;

z-index:50;
}

.fade-black.show{
opacity:1;
}

.next-door{
position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

opacity:0;
pointer-events:none;

z-index:100;

transition:1.2s;
}

.next-door.show{
opacity:1;
pointer-events:auto;
}

.next-door img{
width:140px;
cursor:pointer;
transition:.3s;
}

.next-door img:hover{
transform:translateY(-5px);
}

</style>
</head>
<body>

<div class="world">

<div class="intro" id="intro">
<p>
In another timeline,<br><br>
we lived ten minutes apart.
</p>
</div>

<div class="hotspot school" onclick="showMemory(0)"></div>

<div class="hotspot bench" onclick="showMemory(1)"></div>

<div class="hotspot claw" onclick="showMemory(2)"></div>

<div class="memory" id="memory">
<div class="memory-box">
<p id="memoryText"></p>
</div>
</div>

<div class="fade-black" id="fadeBlack"></div>

<div class="next-door" id="nextDoor">
<img src="./door2.png" onclick="goNext()">
</div>

</div>

<script>

const memoryTexts = [

`We said goodbye here every afternoon.

Then stood there talking
for another twenty minutes anyway.`,

`We sat here every Friday.

You talked.

I listened.

Then somehow three hours disappeared.`,

`You wanted the bunny.

I said it was impossible.

Twenty minutes later,

you were still trying.`

];

let found = new Set();
let timelineFinished = false;

window.addEventListener("load",()=>{

setTimeout(()=>{

document
.getElementById("intro")
.classList.add("hide");

},3500);

});

function showMemory(index){

if(timelineFinished) return;

const memory = document.getElementById("memory");
const text = document.getElementById("memoryText");

text.innerHTML =
memoryTexts[index].replace(/\n/g,"<br><br>");

memory.classList.add("show");

found.add(index);

setTimeout(()=>{

memory.classList.remove("show");

if(found.size === 3 && !timelineFinished){

timelineFinished = true;

setTimeout(()=>{

document
.getElementById("fadeBlack")
.classList.add("show");

setTimeout(()=>{

document
.getElementById("nextDoor")
.classList.add("show");

},2500);

},1000);

}

},5000);

}

function goNext(){

window.location.href = "./timeline2.html";

}

</script>

</body>
</html>
